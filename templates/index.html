<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; text-align: center; }
        .section { background: white; padding: 20px; margin-bottom: 40px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid-box { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .grid { display: inline-block; border: 2px solid #000; background: #fff; }
        .row { display: flex; }
        .cell { width: 45px; height: 45px; border: 0.5px solid #ccc; display: flex; align-items: center; justify-content: center; position: relative; font-size: 10px; }
        .start { background: #a8e6cf !important; }
        .end { background: #ff8b94 !important; }
        .obs { background: #adb5bd !important; }
        .best-path { background: #90ee90 !important; border: 1.5px solid #2e7d32; }
        .cell-id { position: absolute; top: 1px; left: 1px; font-size: 8px; color: #aaa; }
        .arr { font-size: 18px; font-weight: bold; }
        .vval { color: blue; font-weight: bold; font-size: 9px; }
        h2 { text-align: left; border-left: 5px solid #333; padding-left: 10px; }
        button { padding: 10px 15px; cursor: pointer; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>
    <div class="section">
        <h2>H1-1(網格地圖開發)</h2>
        維度 N: <input type="number" id="n_val" value="7" min="3" max="10" style="width:40px">
        <button onclick="initMaster()">生成所有網格</button>
        <div id="m1" style="color:red; margin-top:5px;">狀態: 請設定地圖</div>
        <div id="g1" class="grid"></div>
    </div>
    <div class="section">
        <h2>H1-2(隨機生成行)</h2>
        <button onclick="run2()">執行策略評估 (同步維度 & 固定5路障)</button>
        <div class="grid-box">
            <div><p>Value Matrix</p><div id="v2" class="grid"></div></div>
            <div><p>Policy Matrix (Random)</p><div id="p2" class="grid"></div></div>
        </div>
    </div>
    <div class="section">
        <h2>H1-3(使用價值迭代算法推導最佳政策)</h2>
        <button onclick="run3()">執行價值迭代 (同步維度 & 0路障)</button>
        <div class="grid-box">
            <div><p>Optimal Value V(s)</p><div id="v3" class="grid"></div></div>
            <div><p>Optimal Policy & Path</p><div id="p3" class="grid"></div></div>
        </div>
    </div>
    <script>
        let currentN, s1, e1, o1 = [], st1 = 0;
        function initMaster() {
            currentN = parseInt(document.getElementById('n_val').value);
            s1=null; e1=null; o1=[]; st1=0;
            document.getElementById('m1').innerText = "狀態: 請手動設定起點";
            draw('g1', currentN, true);
            draw('v2', currentN, false); draw('p2', currentN, false);
            draw('v3', currentN, false); draw('p3', currentN, false);
        }
        function draw(id, n, int) {
            const b = document.getElementById(id); b.innerHTML = '';
            for(let r=0; r<n; r++){
                let row = document.createElement('div'); row.className='row';
                for(let c=0; c<n; c++){
                    let cell = document.createElement('div'); cell.className='cell'; cell.id=`${id}-${r}-${c}`;
                    cell.innerHTML=`<span class="cell-id">${r*n+c+1}</span><div class="con"></div>`;
                    if(int) cell.onclick = () => handle1(r,c);
                    row.appendChild(cell);
                }
                b.appendChild(row);
            }
        }
        function handle1(r,c) {
            if(st1>2) return;
            const el = document.getElementById(`g1-${r}-${c}`);
            if(el.className.includes(' ')) return;
            if(st1===0){ s1=[r,c]; el.classList.add('start'); st1++; document.getElementById('m1').innerText="狀態: 請設定終點"; }
            else if(st1===1){ e1=[r,c]; el.classList.add('end'); st1++; document.getElementById('m1').innerText=`設定障礙物 (剩餘 ${currentN-2} 個)`; }
            else { o1.push([r,c]); el.classList.add('obs'); if(o1.length===currentN-2){ st1++; document.getElementById('m1').innerText="HW1-1 設定完成"; } }
        }
        async function run2() {
            const s=[0,1], e=[currentN-1, currentN-2];
            const obs=[[0,0], [0,currentN-1], [currentN-1,0], [currentN-1,currentN-1], [Math.floor(currentN/2), Math.floor(currentN/2)]];
            draw('v2', currentN, false); draw('p2', currentN, false);
            obs.forEach(p => { 
                document.getElementById(`v2-${p[0]}-${p[1]}`).classList.add('obs'); 
                document.getElementById(`p2-${p[0]}-${p[1]}`).classList.add('obs'); 
            });
            const res = await fetch('/solve', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({n:currentN, start:s, end:e, obstacles:obs, mode:'hw1-2'}) });
            const data = await res.json();
            fill('v2', 'p2', currentN, data, e);
        }
        async function run3() {
            const s=[0,0], e=[currentN-1,currentN-1], obs=[];
            draw('v3', currentN, false); draw('p3', currentN, false);
            const res = await fetch('/solve', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({n:currentN, start:s, end:e, obstacles:obs, mode:'hw1-3'}) });
            const data = await res.json();
            fill('v3', 'p3', currentN, data, e);
            data.path.forEach(p => { document.getElementById(`p3-${p[0]}-${p[1]}`).classList.add('best-path'); });
            document.getElementById(`p3-${s[0]}-${s[1]}`).querySelector('.con').innerHTML = "<b>START</b>";
            document.getElementById(`p3-${e[0]}-${e[1]}`).querySelector('.con').innerHTML = "<b>END</b>";
        }
        function fill(vid, pid, n, data, e) {
            for(let r=0; r<n; r++){
                for(let c=0; c<n; c++){
                    const cv=document.getElementById(`${vid}-${r}-${c}`).querySelector('.con'), cp=document.getElementById(`${pid}-${r}-${c}`).querySelector('.con');
                    if(document.getElementById(`${vid}-${r}-${c}`).classList.contains('obs')) continue;
                    cv.innerHTML = `<span class="vval">${data.v[r][c].toFixed(1)}</span>`;
                    if(!(r===e[0] && c===e[1])) cp.innerHTML = `<span class="arr">${data.p[r][c]}</span>`;
                }
            }
        }
        initMaster();
    </script>
</body>
</html>
